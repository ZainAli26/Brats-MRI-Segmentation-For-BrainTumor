# ============================================================
# BraTS Segmentation - Base Configuration
# ============================================================
# Switch datasets by overriding data.dataset:
#   python train.py --config configs/config.yaml          (default: brats2024)
#   python train.py --config configs/config_brats2023.yaml

data:
  dataset: "brats2024"  # "brats2024" or "brats2023"
  train_dir: "../Brats2024/training_data1_v2"
  val_dir: "../Brats2024/validation_data"
  modalities: ["t1c", "t1n", "t2f", "t2w"]
  num_classes: 4  # background + 3 tumor subregions
  # BraTS 2024 labels: 0=background, 1=NCR, 2=ED, 4=ET
  # We remap to: 0=background, 1=NCR, 2=ED, 3=ET (contiguous for training)
  label_map: {0: 0, 1: 1, 2: 2, 4: 3}
  inverse_label_map: {0: 0, 1: 1, 2: 2, 3: 4}

  # Patient-level split from training data (since val_dir has no seg)
  split_ratios: [0.75, 0.15, 0.10]  # train / val / test
  split_seed: 42

preprocessing:
  spatial_size: [128, 128, 128]
  # Intensity normalization: per-channel z-score on nonzero voxels
  norm_method: "zscore_nonzero"
  # Data augmentation (training only)
  augmentation:
    random_flip_prob: 0.5
    random_rotate_prob: 0.3
    random_rotate_range: 0.5236  # 30 degrees in radians
    random_intensity_shift: 0.1
    random_intensity_scale: 0.1

model:
  # Choices: "nnunet_v2", "dynunet", "swin_unetr", "segresnet"
  #   nnunet_v2  — real nnU-Net v2 architecture (PlainConvUNet / ResidualEncoderUNet)
  #   dynunet    — MONAI's DynUNet (nnU-Net-style, lighter alternative)
  #   swin_unetr — Swin Transformer encoder + UNet decoder
  #   segresnet  — ResNet-based encoder-decoder (BraTS challenge winner)
  name: "segresnet"
  in_channels: 4
  out_channels: 4

  # nnU-Net v2 (actual PlainConvUNet / ResidualEncoderUNet from nnunetv2 package)
  nnunet_v2:
    variant: "plain"  # "plain" (PlainConvUNet) or "residual" (ResidualEncoderUNet)
    # Architecture layout matching nnU-Net's auto-plan for 128^3 BraTS inputs
    kernel_sizes: [[3,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3]]
    strides:      [[1,1,1], [2,2,2], [2,2,2], [2,2,2], [2,2,2], [2,2,2]]
    features_per_stage: [32, 64, 128, 256, 320, 320]
    n_blocks_encoder: 2
    n_blocks_decoder: 2
    deep_supervision: true

  # DynUNet — MONAI's nnU-Net-style architecture
  dynunet:
    kernel_sizes: [[3,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3]]
    strides: [[1,1,1], [2,2,2], [2,2,2], [2,2,2], [2,2,2]]
    filters: [32, 64, 128, 256, 512]
    deep_supervision: true
    deep_supervision_heads: 3

  # SwinUNETR specific
  swin_unetr:
    img_size: [128, 128, 128]
    feature_size: 48
    depths: [2, 2, 2, 2]
    num_heads: [3, 6, 12, 24]
    drop_rate: 0.0
    attn_drop_rate: 0.0

  # SegResNet specific
  segresnet:
    init_filters: 32
    blocks_down: [1, 2, 2, 4]
    blocks_up: [1, 1, 1]
    dropout_prob: 0.2

training:
  epochs: 300
  batch_size: 2
  num_workers: 4
  learning_rate: 0.0001
  weight_decay: 0.00001
  optimizer: "adamw"
  scheduler: "cosine_warm_restarts"
  scheduler_params:
    T_0: 50
    T_mult: 2
    eta_min: 0.000001
  # Mixed precision
  amp: true
  # Gradient accumulation steps
  grad_accum_steps: 1
  # Validation frequency (epochs)
  val_interval: 5
  # Early stopping patience (number of val checks)
  early_stopping_patience: 30
  # Loss function
  loss: "dice_ce"  # dice_ce or dice_focal
  dice_weight: 1.0
  ce_weight: 1.0

  # Sliding window inference for validation
  sw_batch_size: 4
  sw_overlap: 0.5

evaluation:
  # Metrics to compute
  metrics: ["dice", "hausdorff95"]
  # Tumor regions to evaluate
  regions:
    ET: [3]          # Enhancing Tumor (remapped label 3 = original 4)
    TC: [1, 3]       # Tumor Core (NCR + ET)
    WT: [1, 2, 3]    # Whole Tumor (NCR + ED + ET)
  # Failure analysis thresholds
  failure_dice_threshold: 0.5
  small_tumor_volume_threshold: 500  # voxels
  # Number of failure cases to visualize
  num_failure_cases: 10

experiment:
  output_dir: "./runs"
  # Run name is auto-generated: {model}_{timestamp}
  save_best_only: true
  log_interval: 10  # steps
