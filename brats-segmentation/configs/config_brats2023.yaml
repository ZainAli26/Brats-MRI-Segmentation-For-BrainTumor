# ============================================================
# BraTS Segmentation - BraTS 2023 Configuration
# ============================================================
# Inherits all model/training/eval settings from base config.
# Only overrides data paths and dataset-specific settings.
#
# BraTS 2023 GLI uses the same modality naming as 2024:
#   t1c, t1n, t2f, t2w, seg
# Labels: 0=background, 1=NCR, 2=ED, 3=ET (already contiguous in 2023)
#
# Usage:
#   python train.py --config configs/config_brats2023.yaml

data:
  dataset: "brats2023"
  train_dir: "../Brats2023/ASNR-MICCAI-BraTS2023-GLI-Challenge-TrainingData"
  val_dir: "../Brats2023/ASNR-MICCAI-BraTS2023-GLI-Challenge-ValidationData"
  modalities: ["t1c", "t1n", "t2f", "t2w"]
  num_classes: 4
  # BraTS 2023 GLI uses labels 0,1,2,3 (already contiguous)
  # label_map is a no-op here but kept for pipeline compatibility
  label_map: {0: 0, 1: 1, 2: 2, 3: 3}
  inverse_label_map: {0: 0, 1: 1, 2: 2, 3: 3}

  split_ratios: [0.75, 0.15, 0.10]
  split_seed: 42
  # cache_dir: ".cache/data_brats2023"

preprocessing:
  spatial_size: [128, 128, 128]
  norm_method: "zscore_nonzero"
  augmentation:
    random_flip_prob: 0.5
    random_rotate_prob: 0.3
    random_rotate_range: 0.5236
    random_intensity_shift: 0.1
    random_intensity_scale: 0.1

model:
  name: "segresnet"
  in_channels: 4
  out_channels: 4

  nnunet_v2:
    variant: "plain"
    kernel_sizes: [[3,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3]]
    strides:      [[1,1,1], [2,2,2], [2,2,2], [2,2,2], [2,2,2], [2,2,2]]
    features_per_stage: [32, 64, 128, 256, 320, 320]
    n_blocks_encoder: 2
    n_blocks_decoder: 2
    deep_supervision: true

  dynunet:
    kernel_sizes: [[3,3,3], [3,3,3], [3,3,3], [3,3,3], [3,3,3]]
    strides: [[1,1,1], [2,2,2], [2,2,2], [2,2,2], [2,2,2]]
    filters: [32, 64, 128, 256, 512]
    deep_supervision: true
    deep_supervision_heads: 3

  swin_unetr:
    img_size: [128, 128, 128]
    feature_size: 48
    depths: [2, 2, 2, 2]
    num_heads: [3, 6, 12, 24]
    drop_rate: 0.0
    attn_drop_rate: 0.0

  segresnet:
    init_filters: 32
    blocks_down: [1, 2, 2, 4]
    blocks_up: [1, 1, 1]
    dropout_prob: 0.2

training:
  epochs: 300
  batch_size: 2
  num_workers: 2
  learning_rate: 0.0001
  weight_decay: 0.00001
  optimizer: "adamw"
  scheduler: "cosine_warm_restarts"
  scheduler_params:
    T_0: 50
    T_mult: 2
    eta_min: 0.000001
  amp: true
  grad_accum_steps: 1
  val_interval: 5
  early_stopping_patience: 30
  loss: "dice_ce"
  dice_weight: 1.0
  ce_weight: 1.0
  sw_batch_size: 4
  sw_overlap: 0.5

evaluation:
  metrics: ["dice", "hausdorff95"]
  regions:
    ET: [3]
    TC: [1, 3]
    WT: [1, 2, 3]
  failure_dice_threshold: 0.5
  small_tumor_volume_threshold: 500
  num_failure_cases: 10

experiment:
  output_dir: "./runs"
  save_best_only: true
  log_interval: 10
